name: Label All PRs

on:
  workflow_dispatch:

jobs:
  label-prs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Label all PRs by subject/course
        run: |
          python3 << 'EOF'
          import re
          import subprocess
          import json

          # Get all PRs (open, closed, merged)
          result = subprocess.run(
              ["gh", "pr", "list", "--state", "all", "--limit", "1000", "--json", "number,headRefName"],
              capture_output=True,
              text=True
          )

          if result.returncode != 0:
              print(f"Error running gh command: {result.stderr}")
              exit(1)

          if not result.stdout.strip():
              print("No PRs found")
              exit(0)

          prs = json.loads(result.stdout)

          for pr in prs:
              number = pr["number"]
              branch = pr["headRefName"]

              # Parse branch: subject/course/student/session-XX
              match = re.match(r"([^/]+)/([^/]+)/", branch)
              if not match:
                  print(f"⚠️  PR #{number}: Branch '{branch}' không match format")
                  continue

              subject, course = match.groups()

              # Add labels to PR
              subprocess.run(
                  ["gh", "pr", "edit", str(number), "--add-label", subject, "--add-label", course],
                  capture_output=True
              )

              print(f"✅ PR #{number}: Added labels '{subject}', '{course}'")

          print("Done!")
          EOF
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
